name: Test Chess Engines

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_all:
        description: 'Test all implementations (ignore changes)'
        required: false
        default: false
        type: boolean

env:
  DOCKER_BUILDKIT: 1
  V2_CORE_ENGINES: "dart lua php python go"
  BUN_VERSION: "1.3.9"

jobs:
  detect-changes:
    name: Detect Changed Implementations
    runs-on: ubuntu-latest
    outputs:
      changed-implementations: ${{ steps.changes.outputs.implementations }}
      has-changes: ${{ steps.changes.outputs.has-changes }}
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Detect changed implementations
        id: changes
        run: |
          ./workflow detect-changes \
            "${{ github.event_name }}" \
            --test-all "${{ github.event.inputs.test_all }}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.sha }}" \
            --before-sha "${{ github.event.before }}"

      - name: Generate dynamic matrix
        id: generate-matrix
        if: steps.changes.outputs.has-changes == 'true'
        run: |
          ./workflow generate-matrix \
            "${{ steps.changes.outputs.implementations }}"

  validation:
    name: Validate Implementation Structure
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Run structure validation
        run: |
          echo "🔍 Running implementation structure validation..."
          ./workflow verify-implementations

  build-test:
    name: Build and Test Chess Engines
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [detect-changes, validation]
    if: needs.detect-changes.outputs.has-changes == 'true'
    
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Build Docker image target
        run: ./workflow verify-make-target ${{ matrix.engine }} image --timeout 900

      - name: Verify build target
        run: ./workflow verify-make-target ${{ matrix.engine }} build --timeout 900

      - name: Verify analyze target
        run: ./workflow verify-make-target ${{ matrix.engine }} analyze --timeout 900

      - name: Verify internal test target
        run: ./workflow verify-make-target ${{ matrix.engine }} test --timeout 900

      - name: Verify chess engine test suite target
        continue-on-error: true
        run: ./workflow verify-make-target ${{ matrix.engine }} test-chess-engine --timeout 1200

      - name: Detect v2 core language
        id: v2-core
        run: |
          ENGINE="${{ matrix.engine }}"
          case " $V2_CORE_ENGINES " in
            *" ${ENGINE} "*) echo "enabled=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "enabled=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: V2 Foundation (Core Blocking)
        if: steps.v2-core.outputs.enabled == 'true'
        run: ./workflow test-chess-engine ${{ matrix.engine }} --track v2-foundation --docker-image chess-${{ matrix.engine }}

      - name: V2 Functional (Core Blocking)
        if: steps.v2-core.outputs.enabled == 'true'
        run: ./workflow test-chess-engine ${{ matrix.engine }} --track v2-functional --docker-image chess-${{ matrix.engine }}

      - name: Ensure workspace clean for ${{ matrix.engine }}
        run: |
          ENGINE=${{ matrix.engine }}
          if [[ -n "$(git status --porcelain implementations/${ENGINE})" ]]; then
            echo "Uncommitted changes detected after testing ${ENGINE}" >&2
            git status --short implementations/${ENGINE}
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: make clean DIR=${{ matrix.engine }}

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, validation, build-test]
    if: always()
    
    steps:
      - name: Test Results Summary
        run: |
          echo "🏆 Chess Engine Test Summary"
          echo "============================"
          echo ""
          
          CHANGED_IMPLEMENTATIONS="${{ needs.detect-changes.outputs.changed-implementations }}"
          HAS_CHANGES="${{ needs.detect-changes.outputs.has-changes }}"
          
          if [[ "$HAS_CHANGES" == "false" ]]; then
            echo "🚫 No implementation changes detected in this PR"
            echo "⏭️ All tests skipped - no changes to validate"
          elif [[ "$CHANGED_IMPLEMENTATIONS" == "all" ]]; then
            echo "✅ All chess engine implementations tested"
            echo "🔍 Full validation suite completed"
          else
            echo "✅ Changed implementations tested: $CHANGED_IMPLEMENTATIONS"
            echo "🎯 Selective testing completed for modified code only"
          fi
          
          echo ""
          echo "🔧 Convention-based testing features:"
          echo "- 📋 chess.meta file configuration"
          echo "- 🔍 Structure validation via Bun workflow"
          echo "- 🏗️ Docker build verification"
          echo "- 🧪 Adaptive functionality testing"
          echo "- 📊 Dynamic discovery from directory structure"
          echo ""
          echo "✨ Ready for merge when all checks pass!"
