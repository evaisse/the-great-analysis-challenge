name: Issue Triage with Copilot

on:
  issues:
    types: [opened, edited, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to triage'
        required: true
        type: number

permissions:
  issues: write
  contents: read

jobs:
  triage:
    name: Triage Issue
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.9"

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Triage issue with AI assistance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./workflow triage-issue \
            --repo "${{ github.repository }}" \
            --issue "${{ github.event.issue.number || github.event.inputs.issue_number }}"

      - name: Summary
        run: |
          echo "# 🎯 Issue Triage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Issue #${{ github.event.issue.number || github.event.inputs.issue_number }} has been triaged." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Labels applied based on content analysis" >> $GITHUB_STEP_SUMMARY
          echo "✅ Title reviewed for clarity" >> $GITHUB_STEP_SUMMARY
          echo "✅ Clarification requested if needed" >> $GITHUB_STEP_SUMMARY
