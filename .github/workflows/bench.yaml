name: Benchmark Suite & Release

on:
  push:
    branches: [main]
  schedule:
    # Run every Sunday at 6 AM UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  actions: read

env:
  BUN_VERSION: "1.3.9"

jobs:
  detect-changes:
    name: Detect Changed Implementations
    runs-on: ubuntu-latest
    outputs:
      changed-implementations: ${{ steps.changes.outputs.implementations }}
      has-changes: ${{ steps.changes.outputs.has-changes }}
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Detect changed implementations
        id: changes
        run: |
          ./workflow detect-changes \
            "${{ github.event_name }}" \
            --test-all "true" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.sha }}" \
            --before-sha "${{ github.event.before }}"

      - name: Generate matrix for benchmarking
        id: generate-matrix
        if: steps.changes.outputs.has-changes == 'true'
        run: |
          ./workflow generate-matrix \
            "${{ steps.changes.outputs.implementations }}"

  validation:
    name: Validate Structure
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    outputs:
      excellent-count: ${{ steps.verify.outputs.excellent_count }}
      good-count: ${{ steps.verify.outputs.good_count }}
      needs-work-count: ${{ steps.verify.outputs.needs_work_count }}
      total-count: ${{ steps.verify.outputs.total_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Run structure verification
        id: verify
        run: ./workflow verify-implementations

  benchmark:
    name: Run Core Benchmarks
    runs-on: ubuntu-latest
    needs: [detect-changes, validation]
    if: needs.detect-changes.outputs.has-changes == 'true'
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Resolve benchmark timeout
        id: benchmark-timeout
        run: |
          timeout_seconds=180
          if [ "${{ github.event_name }}" = "schedule" ]; then
            timeout_seconds=240
          fi
          echo "seconds=${timeout_seconds}" >> "$GITHUB_OUTPUT"
          echo "Using timeout ${timeout_seconds}s for ${{ matrix.engine }}"

      - name: Reset reports workspace
        run: |
          rm -rf reports
          mkdir -p reports

      - name: Run benchmark for ${{ matrix.name }}
        run: ./workflow run-benchmark ${{ matrix.engine }} --timeout ${{ steps.benchmark-timeout.outputs.seconds }}

      - name: Upload core benchmark results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-${{ matrix.engine }}-${{ github.sha }}
          path: |
            reports/${{ matrix.engine }}.json
            reports/${{ matrix.engine }}.out.txt
          if-no-files-found: warn
          retention-days: 30

  benchmark-stress:
    name: Run Stress Benchmarks
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    timeout-minutes: 12

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Resolve benchmark timeout
        id: benchmark-timeout
        run: |
          timeout_seconds=180
          if [ "${{ github.event_name }}" = "schedule" ]; then
            timeout_seconds=240
          fi
          echo "seconds=${timeout_seconds}" >> "$GITHUB_OUTPUT"
          echo "Using timeout ${timeout_seconds}s for ${{ matrix.engine }}"

      - name: Resolve stress profile
        id: stress-profile
        run: |
          profile="quick"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            profile="full"
          fi
          echo "value=${profile}" >> "$GITHUB_OUTPUT"
          echo "Using stress profile ${profile}"

      - name: Reset reports workspace
        run: |
          rm -rf reports
          mkdir -p reports

      - name: Run v2 stress benchmark
        id: stress-run
        continue-on-error: true
        run: ./workflow benchmark-stress ${{ matrix.engine }} --track v2-full --profile ${{ steps.stress-profile.outputs.value }} --timeout ${{ steps.benchmark-timeout.outputs.seconds }} --output reports/${{ matrix.engine }}-stress.out.txt

      - name: Record stress benchmark status
        if: always()
        run: |
          cat > reports/${{ matrix.engine }}-stress.status.json <<'EOF'
          {
            "engine": "${{ matrix.engine }}",
            "profile": "${{ steps.stress-profile.outputs.value }}",
            "outcome": "${{ steps.stress-run.outcome }}",
            "conclusion": "${{ steps.stress-run.conclusion }}"
          }
          EOF

      - name: Upload stress benchmark logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-stress-${{ matrix.engine }}-${{ github.sha }}
          path: |
            reports/${{ matrix.engine }}-stress.out.txt
            reports/${{ matrix.engine }}-stress.status.json
          if-no-files-found: warn
          retention-days: 30

  benchmark-concurrency:
    name: Run Concurrency Benchmarks
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Resolve benchmark timeout
        id: benchmark-timeout
        run: |
          timeout_seconds=180
          if [ "${{ github.event_name }}" = "schedule" ]; then
            timeout_seconds=240
          fi
          echo "seconds=${timeout_seconds}" >> "$GITHUB_OUTPUT"
          echo "Using timeout ${timeout_seconds}s for ${{ matrix.engine }}"

      - name: Resolve stress profile
        id: stress-profile
        run: |
          profile="quick"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            profile="full"
          fi
          echo "value=${profile}" >> "$GITHUB_OUTPUT"
          echo "Using stress profile ${profile}"

      - name: Reset reports workspace
        run: |
          rm -rf reports
          mkdir -p reports

      - name: Build Docker image for concurrency harness
        id: concurrency-build
        continue-on-error: true
        run: make image DIR=${{ matrix.engine }}

      - name: Run concurrency benchmark
        id: concurrency-run
        if: always() && steps.concurrency-build.outcome == 'success'
        continue-on-error: true
        run: ./workflow benchmark-concurrency ${{ matrix.engine }} --profile ${{ steps.stress-profile.outputs.value }} --skip-build --timeout ${{ steps.benchmark-timeout.outputs.seconds }} --output reports/${{ matrix.engine }}-concurrency.json

      - name: Record concurrency benchmark status
        if: always()
        run: |
          cat > reports/${{ matrix.engine }}-concurrency.status.json <<'EOF'
          {
            "engine": "${{ matrix.engine }}",
            "profile": "${{ steps.stress-profile.outputs.value }}",
            "build_outcome": "${{ steps.concurrency-build.outcome }}",
            "build_conclusion": "${{ steps.concurrency-build.conclusion }}",
            "run_outcome": "${{ steps.concurrency-run.outcome || 'skipped' }}",
            "run_conclusion": "${{ steps.concurrency-run.conclusion || 'skipped' }}"
          }
          EOF

      - name: Upload concurrency benchmark results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: benchmark-concurrency-${{ matrix.engine }}-${{ github.sha }}
          path: |
            reports/${{ matrix.engine }}-concurrency.json
            reports/${{ matrix.engine }}-concurrency.status.json
          if-no-files-found: warn
          retention-days: 30

  combine-results:
    name: Combine Benchmark Results
    runs-on: ubuntu-latest
    needs: [detect-changes, validation, benchmark]
    if: always() && needs.detect-changes.outputs.has-changes == 'true'
    outputs:
      readme-changed: ${{ steps.update.outputs.changed }}
      build-error-count: ${{ steps.update.outputs.build-error-count }}
      build-error-languages: ${{ steps.update.outputs.build-error-languages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Download all benchmark artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: benchmark_artifacts/

      - name: Combine benchmark results
        run: ./workflow combine-results --expected all

      - name: Validate benchmark results (informational)
        run: ./workflow validate-results --expected all || true

      - name: Update README status table
        id: update
        run: ./workflow update-readme

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [detect-changes, validation, combine-results]
    if: needs.combine-results.outputs.readme-changed == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download benchmark artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: benchmark_artifacts/

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Combine benchmark results
        run: ./workflow combine-results --expected all

      - name: Update README status table
        id: update
        run: ./workflow update-readme

      - name: Determine version and commit changes
        id: version
        run: |
          # Configure git identity
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          VERSION_TYPE="${{ github.event.inputs.version_type }}"
          if [ -z "$VERSION_TYPE" ]; then
            VERSION_TYPE="patch"
          fi
          BUILD_ERROR_COUNT="${{ needs.combine-results.outputs.build-error-count }}"
          if [ -z "$BUILD_ERROR_COUNT" ]; then
            BUILD_ERROR_COUNT="0"
          fi
          ./workflow create-release \
            --version-type "$VERSION_TYPE" \
            --readme-changed "${{ steps.update.outputs.changed }}" \
            --excellent-count "${{ needs.validation.outputs.excellent-count }}" \
            --good-count "${{ needs.validation.outputs.good-count }}" \
            --needs-work-count "${{ needs.validation.outputs.needs-work-count }}" \
            --total-count "${{ needs.validation.outputs.total-count }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: 'Chess Engine Implementations ${{ steps.version.outputs.new_version }}'
          body: |
            # Chess Engine Implementation Benchmark Release ${{ steps.version.outputs.new_version }}

            This release contains updated performance benchmarks and status information for chess engine implementations.

            ## 📊 Implementation Status Overview

            - 🟢 **Excellent**: ${{ needs.validation.outputs.excellent-count }} implementations
            - 🟡 **Good**: ${{ needs.validation.outputs.good-count }} implementations  
            - 🔴 **Needs Work**: ${{ needs.validation.outputs.needs-work-count }} implementations
            - 🚨 **Build errors in benchmark table**: ${{ needs.combine-results.outputs.build-error-count }} implementations

            **Total**: ${{ needs.validation.outputs.total-count }} implementations tested

            ## 🚀 What's Updated

            - ✅ Performance benchmark suite executed using convention-based approach
            - ✅ Implementation structure verification completed
            - ✅ README status table updated with latest results
            - ✅ Matrix-based parallel benchmarking for efficiency

            ---

            *This release was automatically generated by the benchmark suite workflow.*
          draft: false
          prerelease: false

  summary:
    name: Benchmark Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, validation, benchmark, benchmark-stress, benchmark-concurrency, combine-results, release]
    if: always()

    steps:
      - name: Download stress benchmark artifacts
        if: always() && needs.detect-changes.outputs.has-changes == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: benchmark-stress-*-${{ github.sha }}
          path: stress_artifacts/
          merge-multiple: true

      - name: Download concurrency benchmark artifacts
        if: always() && needs.detect-changes.outputs.has-changes == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: benchmark-concurrency-*-${{ github.sha }}
          path: concurrency_artifacts/
          merge-multiple: true

      - name: Workflow summary
        run: |
          collect_failures() {
            local mode="$1"
            local dir="$2"
            local failures=()
            local file

            if [[ ! -d "$dir" ]]; then
              echo "0|"
              return
            fi

            while IFS= read -r file; do
              if [[ "$mode" == "stress" ]]; then
                outcome=$(jq -r '.outcome // "unknown"' "$file")
                engine=$(jq -r '.engine // "unknown"' "$file")
                if [[ "$outcome" != "success" ]]; then
                  failures+=("${engine} (${outcome})")
                fi
              else
                build_outcome=$(jq -r '.build_outcome // "unknown"' "$file")
                run_outcome=$(jq -r '.run_outcome // "unknown"' "$file")
                engine=$(jq -r '.engine // "unknown"' "$file")
                if [[ "$build_outcome" != "success" ]]; then
                  failures+=("${engine} (build:${build_outcome})")
                elif [[ "$run_outcome" != "success" ]]; then
                  failures+=("${engine} (run:${run_outcome})")
                fi
              fi
            done < <(find "$dir" -type f -name "*.status.json" | sort)

            local joined=""
            if (( ${#failures[@]} > 0 )); then
              joined=$(printf '%s, ' "${failures[@]}")
              joined=${joined%, }
            fi

            echo "${#failures[@]}|${joined}"
          }

          IFS='|' read -r STRESS_FAILURE_COUNT STRESS_FAILURES <<< "$(collect_failures stress stress_artifacts)"
          IFS='|' read -r CONCURRENCY_FAILURE_COUNT CONCURRENCY_FAILURES <<< "$(collect_failures concurrency concurrency_artifacts)"

          echo "# 🏁 Benchmark Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          HAS_CHANGES="${{ needs.detect-changes.outputs.has-changes }}"
          CHANGED_IMPLEMENTATIONS="${{ needs.detect-changes.outputs.changed-implementations }}"

          if [[ "$HAS_CHANGES" == "false" ]]; then
            echo "🚫 No implementation changes detected - workflow skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "## 📊 Results" >> $GITHUB_STEP_SUMMARY
            echo "- **Changed implementations**: $CHANGED_IMPLEMENTATIONS" >> $GITHUB_STEP_SUMMARY
            echo "- **Total implementations**: ${{ needs.validation.outputs.total-count }}" >> $GITHUB_STEP_SUMMARY
            echo "- 🟢 **Excellent**: ${{ needs.validation.outputs.excellent-count }}" >> $GITHUB_STEP_SUMMARY
            echo "- 🟡 **Good**: ${{ needs.validation.outputs.good-count }}" >> $GITHUB_STEP_SUMMARY
            echo "- 🔴 **Needs work**: ${{ needs.validation.outputs.needs-work-count }}" >> $GITHUB_STEP_SUMMARY
            echo "- ⚙️ **Core benchmark matrix**: ${{ needs.benchmark.result }}" >> $GITHUB_STEP_SUMMARY
            echo "- 🔥 **Stress benchmark lane**: informational" >> $GITHUB_STEP_SUMMARY
            echo "- 🔥 **Stress benchmark failures**: ${STRESS_FAILURE_COUNT}" >> $GITHUB_STEP_SUMMARY
            if [[ -n "$STRESS_FAILURES" ]]; then
              echo "- **Failing stress implementations**: ${STRESS_FAILURES}" >> $GITHUB_STEP_SUMMARY
            fi
            echo "- 🧵 **Concurrency benchmark lane**: informational" >> $GITHUB_STEP_SUMMARY
            echo "- 🧵 **Concurrency benchmark failures**: ${CONCURRENCY_FAILURE_COUNT}" >> $GITHUB_STEP_SUMMARY
            if [[ -n "$CONCURRENCY_FAILURES" ]]; then
              echo "- **Failing concurrency implementations**: ${CONCURRENCY_FAILURES}" >> $GITHUB_STEP_SUMMARY
            fi
            echo "- 🚨 **Build errors in README benchmark table**: ${{ needs.combine-results.outputs.build-error-count }}" >> $GITHUB_STEP_SUMMARY
            if [[ -n "${{ needs.combine-results.outputs.build-error-languages }}" ]]; then
              echo "- **Build error implementations**: ${{ needs.combine-results.outputs.build-error-languages }}" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            if [[ "${{ needs.combine-results.outputs.build-error-count }}" != "0" && -n "${{ needs.combine-results.outputs.build-error-count }}" ]]; then
              echo "⚠️ Core benchmark publication succeeded, with build errors reported in the README table." >> $GITHUB_STEP_SUMMARY
            elif [[ "$STRESS_FAILURE_COUNT" != "0" || "$CONCURRENCY_FAILURE_COUNT" != "0" ]]; then
              echo "⚠️ Core benchmark publication succeeded, with informational stress/concurrency failures listed above." >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ Core benchmark publication and informational benchmark lanes completed successfully!" >> $GITHUB_STEP_SUMMARY
            fi
          fi
