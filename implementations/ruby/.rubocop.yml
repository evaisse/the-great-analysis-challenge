require:
  - rubocop-performance

AllCops:
  TargetRubyVersion: 3.0
  NewCops: disable
  SuggestExtensions: false
  Exclude:
    - 'vendor/**/*'
    - 'docker-images/**/*'

Style/Documentation:
  Enabled: false

Metrics/MethodLength:
  Max: 80

Metrics/ClassLength:
  Max: 400

Metrics/AbcSize:
  Max: 200

Metrics/CyclomaticComplexity:
  Max: 30

Metrics/PerceivedComplexity:
  Max: 35

Metrics/ParameterLists:
  Max: 8
  MaxOptionalParameters: 8

# Script permission check is not relevant for Docker-based deployments
Lint/ScriptPermission:
  Enabled: false

Layout/LineLength:
  Max: 150

# Chess notation uses single-letter variable names (r, c, x, y, etc.)
Naming/MethodParameterName:
  MinNameLength: 1

# Chess engine predicates don't always follow Ruby naming conventions
Naming/PredicateMethod:
  Enabled: false

# Optional boolean parameters are used in chess engine APIs
Style/OptionalBooleanParameter:
  Enabled: false

# Chess state machines sometimes have identical branches
Style/IdenticalConditionalBranches:
  Enabled: false

# Hash-like case statements are fine for move type dispatch
Style/HashLikeCase:
  Enabled: false

# Mutable constants in chess piece tables are expected
Style/MutableConstant:
  Enabled: false
